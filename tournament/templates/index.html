<!DOCTYPE html>
<html>
<head>
    <title>Bot Tournament</title>
</head>
<body>
    <h2>🤖🔥💾🧠 Submit a Bot 😁👍😁👍</h2>
    <form action="/submit" method="POST" enctype="multipart/form-data">
        <input type="text" name="bot_name" placeholder="Bot Name" required><br><br>
        <input type="file" name="bot_file" accept=".py" required><br><br>
        <button type="submit">Submit Bot</button>
    </form>

    <h2>💣🗑️🚫🐍 Remove a Bot 😱🤨😔🤯</h2>
    <form action="/delete" method="POST">
        <select name="bot_id" required>
            {% for bot in bots %}
                <option value="{{ bot.id }}">{{ bot.name }}</option>
            {% endfor %}
        </select>
        <button type="submit" onclick="return confirm('Are you sure you want to remove this bot?')">Remove Bot</button>
    </form>

    <h2>🏁💥⚔️🏆 Run the Tournament 🏃🏃🏎️✈️</h2>
    <form action="/run" method="POST">
        <button type="submit">Run Tournament</button>
    </form>
</body>
</html>
