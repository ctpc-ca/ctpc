<!-- templates/leaderboard.html -->
<!DOCTYPE html>
<html>
    <head>
        <title>Tournament Results</title>
    </head>
    <body>
        <h2>📊🥇 Leaderboard 🎯📉</h2>
        <table border="1">
            <tr>
                <th>Bot</th>
                <th>Score</th>
                <th>Wins</th>
                <th>Draws</th>
                <th>Losses</th>
            </tr>
            {% for name, result in results.items() %}
            <tr>
                <td>{{ name }}</td>
                <td>{{ result.score }}</td>
                <td>{{ result.win|length }}</td>
                <td>{{ result.draw|length }}</td>
                <td>{{ result.loss|length }}</td>
            </tr>
            {% endfor %}
        </table>
    </body>
</html>
