{% extends "base.html" %}

{% block head %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forms.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tournament.css') }}">
{% endblock %}

{% block content %}
<h1>User Bot Portal</h1>

<form method="POST" enctype="multipart/form-data" class="form left-align">
    <h2>Upload and Test Your Bot</h2>
    <input type="text" name="bot_name" placeholder="Bot Name" required><br>
    <input type="file" name="bot_file" accept=".py" required><br><br>

    <div class="button-row">
        <!-- <button type="submit" name="action" value="sandbox">Run Against Sample Bots</button> -->
        <button type="submit" name="action" value="submit">Submit Officially</button>
    </div>
</form>
